<!DOCTYPE html>
{% load static %}
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'main.css' %}" />
    <title>Корзина</title>
</head>
<body>
    <div id="panel">
        <a href="/main">Назад</a>
    </div>
    <div id="products">
        <ul>
        {% for i in products %}
        <div id="product">
            {% if i.img.url %}
            <img src="{{ i.img.url }}">
            {% else %}
            <img src="/market/app/images/products/default.jpg">
            {% endif %}
            <details>
                <summary>О товаре</summary>
                <p>Количество:</p><p>{{ i.quantity }}</p>
                {{ i.text }}
                <p>Теги:</p><p>{{ i.tags }}</p>
                <form method="post" action="/basket_delete" onsubmit="alert('Удаленно')">
                    {% csrf_token %}
                    <button id="basket_button" type="submit" value="{{ i.id }}" name="id_basket">Удалить</button>
                </form>
            </details>
            {{ i.data }}
        </div>
        {% endfor %}
        </ul>
    </div>
</body>
</html>
